kind = "web"
previewPath = "/"
title = "CareerForge AI"
version = "1.0.0"
id = "artifacts/careerforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20196
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/careerforge run dev"

[services.env]
PORT = "20196"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/careerforge", "run", "build"]
publicDir = "artifacts/careerforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
